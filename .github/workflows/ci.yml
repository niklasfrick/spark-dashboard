name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      frontend: ${{ steps.filter.outputs.frontend }}
      installer: ${{ steps.filter.outputs.installer }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@v6
      - id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            rust:
              - 'src/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'frontend/**'
              - 'deploy/host/systemd/**'
              - 'deploy/host/config.env.example'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci.yml'
            installer:
              - 'deploy/host/install.sh'
              - 'deploy/host/systemd/**'
              - 'deploy/host/config.env.example'
              - '.github/workflows/ci.yml'
            docker:
              - 'deploy/docker/Dockerfile'
              - 'deploy/docker/docker-compose*.yml'
              - '.dockerignore'
              - 'src/**'
              - 'frontend/**'
              - '.github/workflows/ci.yml'

  rust:
    name: Rust (aarch64-linux)
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      # rust-embed needs frontend/dist/ present at build time.
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets --locked -- -D warnings
      - name: Test
        run: cargo test --locked
      - name: Release build smoke
        run: cargo build --release --locked

  frontend:
    name: Frontend
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test -- --run

  installer:
    name: Installer lint
    needs: changes
    if: needs.changes.outputs.installer == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: shellcheck install.sh
        run: shellcheck deploy/host/install.sh
      - name: systemd-analyze verify
        run: |
          # systemd-analyze exits non-zero on validation errors but can spit
          # warnings about missing users at lint time — we care about syntax.
          sudo apt-get update -qq && sudo apt-get install -y systemd
          systemd-analyze verify deploy/host/systemd/spark-dashboard.service || \
            echo "(warnings above are OK on a CI host without the service user)"

  docker:
    name: Docker build (${{ matrix.arch }})
    needs: changes
    if: needs.changes.outputs.docker == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      # Native per-arch build (no QEMU): confirms the multi-stage Dockerfile
      # compiles for both targets. Publishes nothing — that's docker-publish.yml.
      # amd64 loads the image so Trivy can scan it; arm64 just confirms the build.
      - name: Build image (${{ matrix.platform }})
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/docker/Dockerfile
          platforms: ${{ matrix.platform }}
          push: false
          load: ${{ matrix.arch == 'amd64' }}
          tags: spark-dashboard:ci-${{ matrix.arch }}
          cache-from: type=gha,scope=docker-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=docker-${{ matrix.arch }}

      # Fail the build on new HIGH/CRITICAL OS or library CVEs in the runtime
      # image. ignore-unfixed skips CVEs with no available fix (e.g. distroless's
      # own glibc advisories awaiting a Debian patch) so the gate stays actionable.
      # Scanned once on amd64 — OS-package findings are arch-independent.
      - name: Scan image for vulnerabilities
        if: matrix.arch == 'amd64'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: spark-dashboard:ci-amd64
          scan-type: image
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
