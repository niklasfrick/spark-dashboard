# OpenAI-compatible reverse proxy in front of three vLLM instances.
#
# Every /v1/* endpoint behaves exactly like a single vLLM/OpenAI server,
# backed by whichever upstream owns the requested model. The proxy keeps
# one consistent API surface: GET /v1/models aggregates across all three
# upstreams, GET /v1/models/{id} resolves to the owning upstream, and POST
# /v1/{chat/completions,completions,embeddings} routes by the `model` field
# in the request body. Errors are returned in the OpenAI error envelope.
#
# Path-based shortcuts (/small, /medium, /large) are kept as a debugging
# convenience but are not part of the OpenAI API surface.

events {}

http {
    upstream small  { server vllm-small:8000; }
    upstream medium { server vllm-medium:8000; }
    upstream large  { server vllm-large:8000; }

    # Docker's embedded DNS for any runtime lookups.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Keep request bodies in memory so access_by_lua can read them without
    # spilling to temp files.
    client_body_buffer_size 32m;
    client_max_body_size 32m;

    # Shared routing table populated at config load. Lowercased keys so
    # lookups are case-insensitive. Values are upstream block names.
    init_by_lua_block {
        _G.upstream_names = { "small", "medium", "large" }
        _G.model_routes = {
            -- Short served-model-name aliases (what callers should prefer)
            ["qwen2.5-0.5b"] = "small",
            ["qwen2.5-3b"]   = "medium",
            ["qwen2.5-7b"]   = "large",
            -- Full HuggingFace hub ids accepted verbatim
            ["qwen/qwen2.5-0.5b-instruct"] = "small",
            ["qwen/qwen2.5-3b-instruct"]   = "medium",
            ["qwen/qwen2.5-7b-instruct"]   = "large",
        }

        _G.openai_error = function(status, code, message)
            local cjson = require "cjson.safe"
            ngx.status = status
            ngx.header["Content-Type"] = "application/json"
            ngx.say(cjson.encode({
                error = {
                    message = message,
                    type    = "invalid_request_error",
                    code    = code,
                    param   = "model",
                },
            }))
            return ngx.exit(status)
        end
    }

    server {
        listen 8000;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;

        # -----------------------------------------------------------------
        # OpenAI: GET /v1/models  -> aggregate from every upstream.
        # -----------------------------------------------------------------
        location = /v1/models {
            content_by_lua_block {
                local cjson = require "cjson.safe"
                local subs = {}
                for _, name in ipairs(_G.upstream_names) do
                    table.insert(subs, {
                        "/_internal/" .. name .. "/v1/models",
                        { method = ngx.HTTP_GET, copy_all_vars = true },
                    })
                end
                local results = { ngx.location.capture_multi(subs) }
                local merged = { object = "list", data = {} }
                for _, r in ipairs(results) do
                    if r and r.status == 200 and r.body then
                        local parsed = cjson.decode(r.body)
                        if parsed and type(parsed.data) == "table" then
                            for _, m in ipairs(parsed.data) do
                                table.insert(merged.data, m)
                            end
                        end
                    end
                end
                ngx.header["Content-Type"] = "application/json"
                ngx.say(cjson.encode(merged))
            }
        }

        # -----------------------------------------------------------------
        # OpenAI: GET /v1/models/{id}  -> resolve to owning upstream.
        # -----------------------------------------------------------------
        location ~ ^/v1/models/(?<model_id>[^/]+)$ {
            set $target "";
            access_by_lua_block {
                local id = ngx.var.model_id or ""
                local t  = _G.model_routes[id:lower()]
                if not t then
                    return _G.openai_error(
                        404, "model_not_found",
                        "The model '" .. id .. "' does not exist"
                    )
                end
                ngx.var.target = t
            }
            proxy_pass http://$target;
        }

        # -----------------------------------------------------------------
        # Internal-only subrequests used by the /v1/models aggregator.
        # -----------------------------------------------------------------
        location ~ ^/_internal/(?<u_name>small|medium|large)(?<u_path>/.*)$ {
            internal;
            proxy_pass http://$u_name$u_path;
        }

        # -----------------------------------------------------------------
        # OpenAI: POST /v1/*  -> route by "model" field in the JSON body.
        # Covers chat/completions, completions, embeddings, and any future
        # body-bearing OpenAI endpoint that carries a model field.
        # -----------------------------------------------------------------
        location /v1/ {
            set $target "";
            access_by_lua_block {
                local cjson = require "cjson.safe"
                ngx.req.read_body()
                local body = ngx.req.get_body_data()
                if not body then
                    local path = ngx.req.get_body_file()
                    if path then
                        local f = io.open(path, "rb")
                        if f then body = f:read("*a"); f:close() end
                    end
                end

                local model
                if body and #body > 0 then
                    local parsed = cjson.decode(body)
                    if parsed and type(parsed.model) == "string" then
                        model = parsed.model
                    end
                    if not model then
                        -- Fallback: tolerate non-strict JSON.
                        model = body:match('"model"%s*:%s*"([^"]+)"')
                    end
                end

                if not model then
                    return _G.openai_error(
                        400, "missing_model",
                        "Request body must include a \"model\" field"
                    )
                end

                local t = _G.model_routes[model:lower()]
                if not t then
                    return _G.openai_error(
                        404, "model_not_found",
                        "The model '" .. model .. "' does not exist. " ..
                        "Available: qwen2.5-0.5b, qwen2.5-3b, qwen2.5-7b"
                    )
                end
                ngx.var.target = t
            }
            proxy_pass http://$target;
        }

        # -----------------------------------------------------------------
        # Path-based shortcuts (debugging / explicit-upstream use).
        # -----------------------------------------------------------------
        location /small/ {
            rewrite ^/small/(.*)$ /$1 break;
            proxy_pass http://small;
        }
        location /medium/ {
            rewrite ^/medium/(.*)$ /$1 break;
            proxy_pass http://medium;
        }
        location /large/ {
            rewrite ^/large/(.*)$ /$1 break;
            proxy_pass http://large;
        }

        # -----------------------------------------------------------------
        # Health + landing page.
        # -----------------------------------------------------------------
        location = /health {
            default_type application/json;
            return 200 '{"status":"ok","upstreams":["small","medium","large"]}';
        }

        location = / {
            default_type text/plain;
            return 200 "vllm-multi reverse proxy (OpenAI-compatible)\n\nOpenAI API surface (routes by model, aggregates across all vLLM instances):\n  GET  /v1/models                      list of every served model\n  GET  /v1/models/{id}                  retrieve a specific model\n  POST /v1/chat/completions             routes by body \"model\"\n  POST /v1/completions                  routes by body \"model\"\n  POST /v1/embeddings                   routes by body \"model\"\n\nServed model ids:\n  qwen2.5-0.5b   (alias of Qwen/Qwen2.5-0.5B-Instruct)\n  qwen2.5-3b     (alias of Qwen/Qwen2.5-3B-Instruct)\n  qwen2.5-7b     (alias of Qwen/Qwen2.5-7B-Instruct)\n\nExplicit per-upstream paths (debugging only; not part of the OpenAI API):\n  /small/* -> vllm-small  (direct: http://host:8001)\n  /medium/* -> vllm-medium (direct: http://host:8002)\n  /large/* -> vllm-large   (direct: http://host:8003)\n\nHealth: GET /health\n";
        }
    }
}
